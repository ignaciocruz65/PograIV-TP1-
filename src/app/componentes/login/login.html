<div class="row justify-content-center mt-5">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card shadow border-0 rounded-3">
      <div class="card-body p-5">
        <h2 class="text-center fw-bold mb-4 text-primary">Iniciar Sesion</h2>
        
        <form>
          <div class="form-floating mb-3">
            <input type="email" class="form-control" id="floatingInput" placeholder="nombre@ejemplo.com">
            <label for="floatingInput">Correo Electrónico</label>
          </div>
          <div class="form-floating mb-4">
            <input type="password" class="form-control" id="floatingPassword" placeholder="Contraseña">
            <label for="floatingPassword">Contraseña</label>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fs-5 shadow-sm">Entrar a la Sala</button>
        </form>
      </div>
    </div>
  </div>
</div>

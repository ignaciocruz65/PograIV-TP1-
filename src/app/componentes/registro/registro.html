<div class="row justify-content-center mt-5">
  <div class="col-12 col-md-10 col-lg-6">
    <div class="card shadow border-0 rounded-3">
      <div class="card-body p-5">
        <h2 class="text-center fw-bold mb-4 text-success">Crear Cuenta</h2>
        
        <form>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <div class="form-floating">
                <input type="text" class="form-control" id="nombreInput" placeholder="Nombre">
                <label for="nombreInput">Nombre</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating">
                <input type="text" class="form-control" id="apellidoInput" placeholder="Apellido">
                <label for="apellidoInput">Apellido</label>
              </div>
            </div>
          </div>
          
          <div class="form-floating mb-3">
            <input type="email" class="form-control" id="emailRegistro" placeholder="nombre@ejemplo.com">
            <label for="emailRegistro">Correo Electrónico</label>
          </div>
          <div class="form-floating mb-4">
            <input type="password" class="form-control" id="passRegistro" placeholder="Contraseña">
            <label for="passRegistro">Contraseña</label>
          </div>
          
          <button type="submit" class="btn btn-success w-100 py-2 fs-5 shadow-sm">Registrarme</button>
        </form>
      </div>
    </div>
  </div>
</div>

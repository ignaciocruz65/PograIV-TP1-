<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="col-12 col-sm-8 col-md-6 col-lg-4">
    
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-header bg-success text-white text-center rounded-top-4 py-4">
        <h2 class="fw-bold mb-0">Registrarse</h2>
      </div>
      
      <div class="card-body p-4 p-md-5">
        <form>
          @if (errorMsg()) {
            <div class="alert alert-danger border-0 small mb-3">
              {{ errorMsg() }}
            </div>
          }

          <div class="form-floating mb-3">
            <input type="text" class="form-control rounded-3" id="nombre" placeholder="Nombre">
            <label for="nombre">Nombre</label>
          </div>
          
          <div class="form-floating mb-3">
            <input type="text" class="form-control rounded-3" id="apellido" placeholder="Apellido">
            <label for="apellido">Apellido</label>
          </div>

          <div class="form-floating mb-3">
            <input type="email" name="email" [(ngModel)]="email" class="form-control rounded-3" id="correo" placeholder="Correo electrónico">
            <label for="correo">Correo electrónico</label>
          </div>
          
          <div class="form-floating mb-4">
            <input type="password" name="clave" [(ngModel)]="clave" class="form-control rounded-3" id="pass" placeholder="Contraseña">
            <label for="pass">Contraseña</label>
          </div>

          <div class="d-grid gap-2">
            <button 
              (click)="registrar()" 
              [disabled]="cargando()" 
              class="btn btn-success btn-lg fw-bold rounded-pill shadow-sm" 
              type="button">
              
              @if (cargando()) {
                <span class="spinner-border spinner-border-sm" role="status"></span>
                Enviando...
              } @else {
                Registrarse
              }
            </button>
          </div>
        </form>
      </div>
      
      <div class="card-footer text-center bg-light py-3 rounded-bottom-4 border-0">
        <small class="text-muted">¿Ya tenes cuenta? <a href="/login" class="text-success fw-bold text-decoration-none">Inicia sesion aca</a></small>
      </div>
    </div>

  </div>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      
      <h1 class="display-5 fw-bold text-center mb-5">Sobre Mí</h1>
      @if (miPerfil()) {
      <div class="card shadow-lg border-0 rounded-4 text-center overflow-hidden">
        <div class="card-body p-4">
          
          <img [src]="miPerfil().avatar_url" alt="fotogithub" class="img-fluid rounded-circle border border-4 border-light shadow-sm mb-4" >
          <h2 class="card-title fw-bold h3 mb-2">{{ miPerfil().name}}</h2>
          
          <div class="d-flex justify-content-center gap-2 mb-3">
            <span class="badge rounded-pill bg-primary px-3">ID: {{ miPerfil().id }}</span>
            <span class="badge rounded-pill bg-dark px-3">Desde: {{ miPerfil().created_at }}</span>
          </div>
          <p class="card-text text-muted mb-4"> {{ miPerfil().bio}}</p>
          <div class="d-grid">
            <a [href]="miPerfil().html_url" target="_blank" class="btn btn-dark btn-lg rounded-pill shadow-sm"> Ver Perfil de GitHub
            </a>
          </div>
        </div>
      </div>
      } @else {
        <div class="d-flex flex-column align-items-center my-5">
          <div class="spinner-border text-primary mb-2" role="status"></div>
          <p class="text-muted">Pidiendo los datos de GitHub</p>
        </div>
      }

      <hr class="my-5 opacity-25">

      <div class="bg-light p-4 rounded-4 border border-1 text-center shadow-sm">
        <h2 class="h4 fw-bold mb-3 text-secondary">Mi Juego Propio: Emm lo estoy pensando</h2>
        <div class="alert alert-info border-0 shadow-sm mb-0">
          <p class="mb-0 fw-semibold">Lo sigo pensando...</p>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="container py-5 d-flex justify-content-center">
    <div class="col-12 col-md-8 col-lg-6 glass-card p-4">
        
        <div class="mesa-juego text-center shadow-lg">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
            <span class="text-white-50 fw-bold text-uppercase tracking-wide small">Puntuación</span>
            <span class="fs-3 fw-bold text-warning">{{ puntaje() }}</span>
        </div>

        <p class="text-light fw-semibold mb-5 text-uppercase" style="letter-spacing: 2px;">
            {{ mensaje() }}
        </p>

        <div class="carta-en-juego mb-5">
            <span class="carta-en-juego-text">{{ cartaActual() }}</span>
        </div>

        <div class="d-grid gap-3 d-md-flex justify-content-md-center">
            <button (click)="jugar('mayor')" [disabled]="juegoTerminado()" 
                    class="btn btn-outline-light btn-lg fw-bold px-5 py-3 text-uppercase w-100 rounded-pill hover-scale">
            Mayor
            </button>
            <button (click)="jugar('menor')" [disabled]="juegoTerminado()" 
                    class="btn btn-light btn-lg fw-bold px-5 py-3 text-uppercase w-100 rounded-pill text-dark hover-scale">
            Menor
            </button>
        </div>

        @if (juegoTerminado()) {
            <div class="mt-5 pt-4 border-top border-secondary fade-in">
            <button (click)="reiniciar()" class="btn btn-jugar-denuevo btn-lg fw-bold w-100 text-uppercase rounded-pill py-3 shadow">
                Jugar de Nuevo
            </button>
            </div>
        }
        </div>

    </div>
</div>
